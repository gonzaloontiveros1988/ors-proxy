function renderTicker(){
  var tk=DB.tickers[TICKER];if(!tk)return renderHome();
  var j=DB.journal;
  var tkT=j.filter(function(t){return t.ticker===TICKER;});
  var tkW=tkT.filter(function(t){return t.result==='WIN';}).length;
  var q=MKT[TICKER];
  var a=analyzeSymbol(TICKER);
  var lp=q?q.price:(tk.prices&&tk.prices.length?tk.prices[tk.prices.length-1].close:null);

  var tabs='<div class="tabs"><button class="tab'+(TAB==='overview'?' on':'')+'" onclick="setTab(\'overview\')">Resumen</button><button class="tab'+(TAB==='chart'?' on':'')+'" onclick="setTab(\'chart\')">Gráfico</button><button class="tab'+(TAB==='intraday'?' on':'')+'" onclick="setTab(\'intraday\');loadIntraday(\''+TICKER+'\')" style="'+(TAB==='intraday'?'':'')+'">15min</button><button class="tab'+(TAB==='patterns'?' on':'')+'" onclick="setTab(\'patterns\')">Patrones</button><button class="tab'+(TAB==='trades'?' on':'')+'" onclick="setTab(\'trades\')">Trades</button></div>';

  var extra='<div style="display:flex;gap:6px">';
  extra+='<button class="btn btn-blue" onclick="refreshTicker(\''+TICKER+'\')" style="padding:6px 10px;font-size:13px">↻</button>';
  extra+='<button class="btn btn-watch" onclick="VIEW=\'backtest\';render()" style="padding:7px 10px;font-size:11px">🔬</button>';
  extra+='<button class="btn btn-signal" onclick="quickTrade(\''+TICKER+'\')" style="padding:7px 13px;font-size:12px">+ Trade</button>';
  extra+='</div>';

  var html=hdr('📊 '+TICKER,'','home',extra)+tabs+'<div class="wrap fade">';

  if(TAB==='overview' && a){
    // Price + phase
    if(lp){
      var pc=q&&q.changePct>=0?'var(--bull)':'var(--bear)';
      html+='<div class="card '+a.phase.cardCls+'" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
      html+='<div><div style="font-size:28px;font-weight:800;color:'+pc+'">$'+lp.toFixed(2)+'</div>';
      if(q)html+='<div style="font-size:12px;color:'+pc+'">'+(q.changePct>=0?'+':'')+q.changePct.toFixed(2)+'% hoy | H:$'+q.high.toFixed(2)+' L:$'+q.low.toFixed(2)+'</div>';
      html+='</div>';
      html+='<div style="text-align:right">'+phaseBadge(a.phase)+'<div style="font-size:10px;color:var(--muted);margin-top:6px"><span class="live-dot"></span>DATOS REALES</div></div>';
      html+='</div>';
    }

    // EXIT SIGNAL — for open trades on this ticker
    var openTrade=tkT.filter(function(t){return t.status==='open'||t.result==='OPEN';})[0];
    if(openTrade){
      var exitSig=calcExitSignal(TICKER,openTrade.entry);
      if(exitSig){
        html+='<div class="card" style="border-color:'+exitSig.urgencyColor+'50;background:'+exitSig.urgencyColor.replace('var(','').replace(')','')+'08;margin-bottom:12px">';
        html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
        html+='<div class="sec-hdr" style="margin:0;color:'+exitSig.urgencyColor+'">📤 SEÑAL DE GESTIÓN — POSICIÓN ABIERTA</div>';
        if(exitSig.urgency!=='MANTENER'){
          html+='<button onclick="sendExitAlertManual(\''+TICKER+'\')" class="btn" style="background:'+exitSig.urgencyColor+'20;border:1px solid '+exitSig.urgencyColor+'50;color:'+exitSig.urgencyColor+';padding:6px 12px;font-size:11px">📱 Alertar</button>';
        }
        html+='</div>';

        // Status badge
        html+='<div style="font-size:13px;font-weight:700;color:'+exitSig.urgencyColor+';margin-bottom:10px">'+exitSig.urgencyLabel+'</div>';

        // P&L actual
        if(exitSig.pnlActual!==null){
          html+='<div style="display:flex;gap:12px;margin-bottom:10px">';
          html+='<div class="stat-box2" style="background:'+( exitSig.pnlActual>=0?'var(--bull)':'var(--bear)')+'15;border-color:'+(exitSig.pnlActual>=0?'var(--bull)':'var(--bear)')+'30">';
          html+='<div class="stat-lbl2">P&L ACTUAL</div>';
          html+='<div class="stat-val2" style="color:'+(exitSig.pnlActual>=0?'var(--bull)':'var(--bear)')+'">'+(exitSig.pnlActual>=0?'+':'')+exitSig.pnlActual+'%</div></div>';
          html+='<div class="stat-box2"><div class="stat-lbl2">ENTRADA</div><div class="stat-val2" style="font-size:15px">$'+openTrade.entry+'</div></div>';
          html+='<div class="stat-box2"><div class="stat-lbl2">AHORA</div><div class="stat-val2" style="font-size:15px;color:var(--accent)">$'+exitSig.last.toFixed(2)+'</div></div>';
          html+='</div>';
        }

        // Exit signals table
        if(exitSig.signals.length){
          html+='<div style="margin-bottom:10px">';
          exitSig.signals.forEach(function(s){
            html+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">';
            html+='<div style="flex:1"><div style="font-size:12px;font-weight:600;color:'+s.color+'">'+s.label+'</div><div style="font-size:10px;color:var(--sub)">'+s.detail+'</div></div>';
            html+='<span style="font-size:11px;font-weight:700;color:'+s.color+'">'+s.weight+'</span>';
            html+='</div>';
          });
          html+='</div>';
        } else {
          html+='<div style="font-size:12px;color:var(--sub)">Sin señales de salida activas. Mantén posición.</div>';
        }

        // Trailing stop
        if(exitSig.trailingStop){
          html+='<div style="background:var(--card2);border-radius:10px;padding:10px 13px;display:flex;justify-content:space-between;align-items:center">';
          html+='<div><div style="font-size:11px;color:var(--sub)">Trailing stop sugerido</div><div style="font-size:10px;color:var(--muted)">ATR ×1.2 bajo precio actual</div></div>';
          html+='<div style="font-size:16px;font-weight:700;color:var(--bear)">$'+exitSig.trailingStop+'</div>';
          html+='</div>';
        }

        // Action buttons
        html+='<div style="display:flex;gap:8px;margin-top:12px">';
        if(exitSig.urgency==='SALIR_AHORA')html+='<div style="flex:1;background:var(--bear)20;border:1px solid var(--bear)40;border-radius:10px;padding:10px;text-align:center;font-size:12px;font-weight:700;color:var(--bear)">🔴 Confirma VENTA en TradingView</div>';
        else if(exitSig.urgency==='AJUSTAR_STOP')html+='<div style="flex:1;background:var(--watch)20;border:1px solid var(--watch)40;border-radius:10px;padding:10px;text-align:center;font-size:12px;font-weight:700;color:var(--watch)">🟡 Sube el stop loss</div>';
        else html+='<div style="flex:1;background:var(--signal)20;border:1px solid var(--signal)40;border-radius:10px;padding:10px;text-align:center;font-size:12px;font-weight:700;color:var(--signal)">🟢 Mantén posición</div>';
        html+='</div>';
        html+='</div>';
      }
    }

    // Phase explanation card
    html+='<div class="card" style="background:'+a.phase.color.replace('var(','').replace(')','')+'1a;border-color:'+a.phase.color+'40;margin-bottom:12px">';
    html+='<div style="font-size:11px;color:'+a.phase.color+';font-weight:700;margin-bottom:6px">'+a.phase.label+'</div>';
    html+='<div style="font-size:12px;color:var(--text)">'+a.phase.desc+'</div>';
    if(a.orsBlockers.length){
      html+='<div style="margin-top:8px">';
      a.orsBlockers.forEach(function(b){html+='<div style="font-size:11px;color:var(--bear);margin-top:3px">⚠️ '+b+'</div>';});
      html+='</div>';
    }
    html+='</div>';

    // ── KEY STATS ROW — nearest S/R + predecible + WR ────
    // Find nearest support and resistance from short term (week + 20d)
    var weekLvl = a.allLvl ? a.allLvl.week : null;
    var shortLvl2 = a.allLvl ? a.allLvl.short : null;
    var nearestSup = null, nearestRes = null;
    var nearestSupDist = 999, nearestResDist = 999;
    [weekLvl, shortLvl2].forEach(function(lvl){
      if(!lvl) return;
      lvl.supports.forEach(function(s){
        var d = (lp - s.price) / s.price * 100;
        if(d >= 0 && d < nearestSupDist){ nearestSupDist = d; nearestSup = s; }
      });
      lvl.resistances.forEach(function(r){
        var d = (r.price - lp) / lp * 100;
        if(d >= 0 && d < nearestResDist){ nearestResDist = d; nearestRes = r; }
      });
    });
    // Fallback to mid term if nothing found nearby
    if(!nearestSup && a.allLvl && a.allLvl.mid){
      var midSups = a.allLvl.mid.supports.filter(function(s){return s.price < lp;});
      if(midSups.length){ midSups.sort(function(a,b){return b.price-a.price;}); nearestSup = midSups[0]; nearestSupDist = (lp-nearestSup.price)/nearestSup.price*100; }
    }
    if(!nearestRes && a.allLvl && a.allLvl.mid){
      var midRes = a.allLvl.mid.resistances.filter(function(r){return r.price > lp;});
      if(midRes.length){ midRes.sort(function(a,b){return a.price-b.price;}); nearestRes = midRes[0]; nearestResDist = (nearestRes.price-lp)/lp*100; }
    }

    // Stats grid: Predecible | WR | S/R inmediato
    html+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px">';
    // Predecible
    var pscore = a.oppScore;
    var psCol = pscore>=65?'var(--signal)':pscore>=45?'var(--watch)':'var(--bear)';
    html+='<div class="stat-box2"><div class="stat-lbl2">PREDECIBLE</div><div class="stat-val2" style="color:'+psCol+'">'+pscore+'</div><div style="font-size:9px;color:var(--sub)">/100</div></div>';
    // Win rate
    var tkWR2 = tkT.length ? Math.round(tkT.filter(function(t){return t.result==='WIN';}).length/tkT.length*100) : null;
    html+='<div class="stat-box2"><div class="stat-lbl2">WIN RATE</div><div class="stat-val2" style="color:'+(tkWR2!==null?wColor(tkWR2):'var(--muted)')+'">'+(tkWR2!==null?tkWR2+'%':'—')+'</div><div style="font-size:9px;color:var(--sub)">'+tkT.length+' trades</div></div>';
    // RSI actual
    html+='<div class="stat-box2"><div class="stat-lbl2">RSI ACTUAL</div><div class="stat-val2" style="color:'+(a.rsi!==null?a.rsiColor:'var(--sub)')+'">'+(a.rsi!==null?a.rsi:'—')+'</div><div style="font-size:9px;color:var(--sub)">'+(a.rsi!==null?a.rsiLabel:'')+'</div></div>';
    html+='</div>';

    // S/R INMEDIATO — visual destacado
    html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">';
    // Nearest support
    if(nearestSup){
      var supPct = nearestSupDist.toFixed(1);
      var supUrgency = nearestSupDist<1.5?'🔥 MUY CERCANO':nearestSupDist<3?'📍 CERCANO':'📌 PRÓXIMO';
      var supUrgCol = nearestSupDist<1.5?'var(--signal)':nearestSupDist<3?'var(--watch)':'var(--bull)';
      html+='<div class="stat-box2" style="border-color:var(--bull)30;background:var(--bull)08">';
      html+='<div style="font-size:9px;color:var(--bull);letter-spacing:1px;margin-bottom:4px">SOPORTE INMEDIATO</div>';
      html+='<div style="font-size:20px;font-weight:800;color:var(--bull)">$'+nearestSup.price+'</div>';
      html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:3px">';
      html+='<span style="font-size:10px;color:var(--sub)">−'+supPct+'%</span>';
      html+='<span style="font-size:10px;color:'+supUrgCol+'">'+supUrgency+'</span>';
      html+='</div>';
      html+='<div style="font-size:9px;color:var(--muted);margin-top:2px">'+nearestSup.strength+' toques · 7-20 días</div>';
      html+='</div>';
    } else {
      html+='<div class="stat-box2"><div class="stat-lbl2">SOPORTE</div><div style="font-size:14px;color:var(--muted)">Sin datos</div></div>';

        });

    }
  }


  if(TAB==='trades'){
    var trds=tkT;
    if(!trds.length){
      html+='<div class="empty">Sin trades en este ticker.<br><button class="btn btn-signal" onclick="quickTrade(\''+TICKER+'\')" style="margin-top:12px;padding:10px 20px">+ Registrar trade</button></div>';
    } else {
      [].concat(trds).reverse().forEach(function(t){
        var p=t.exit?pnlPct(t.entry,t.exit):null;
        var isOpen=t.status==='open'||t.result==='OPEN';
        var liveP=isOpen&&MKT[t.ticker]?MKT[t.ticker].price:null;
        var livePnl=liveP?pnlPct(t.entry,liveP):null;
        var bc=isOpen?'var(--watch)':t.result==='WIN'?'var(--bull)':t.result==='LOSS'?'var(--bear)':'var(--watch)';
        html+='<div class="trade-row" style="border-color:'+bc+';margin-bottom:8px">';

        html+='<span style="font-size:11px;color:var(--sub)">'+t.date+'</span>';
        html+='<div style="display:flex;gap:6px;align-items:center">';
        if(isOpen&&livePnl!==null)html+='<span style="font-size:14px;font-weight:700;color:'+(livePnl>=0?'var(--bull)':'var(--bear)')+'">'+(livePnl>=0?'+':'')+livePnl+'% LIVE</span>';
        else if(p!==null)html+='<span style="font-size:14px;font-weight:700;color:'+(p>=0?'var(--bull)':'var(--bear)')+'">'+(p>=0?'+':'')+p+'%</span>';
        if(isOpen)html+=mkPill('ABIERTA','var(--watch)');
        else html+=mkPill(t.result,bc);
        html+=mkPill('ORS '+orsScore(t.conditions)+'/5',orsScore(t.conditions)>=4&&t.conditions.obvAlcista?'var(--signal)':'var(--bear)');
        html+='</div></div>';
        html+='<div style="font-size:12px;color:var(--sub)">$'+t.entry+(t.qty?' × '+t.qty:'')+(t.exit?' → $'+t.exit:'')+(isOpen&&liveP?' (Live $'+liveP.toFixed(2)+')':'')+'</div>';
        if(t.stop){html+='<div style="font-size:11px;color:var(--bear);margin-top:3px">SL: $'+t.stop;if(isOpen&&liveP){var distToStop=((liveP-t.stop)/t.stop*100).toFixed(1);html+=' · '+distToStop+'% sobre SL';}html+='</div>';}
        if(isOpen&&liveP&&livePnl>3)html+='<div style="font-size:11px;color:var(--signal);margin-top:3px">💡 Trailing stop sugerido: $'+(liveP*0.97).toFixed(2)+'</div>';
        if(t.error)html+='<div style="font-size:11px;color:var(--bear);margin-top:3px">⚠️ '+t.error+'</div>';
        if(t.notes)html+='<div style="font-size:11px;color:var(--muted);margin-top:2px">'+t.notes+'</div>';
        html+='</div>';
      });
    }
  }

  html+='</div>';
  return html;
}

function renderTradeDynamic(){
  var f=TRADE_FORM;
  var html='';
  var entry=parseFloat(f.entry)||0;
  var qty=parseFloat(f.qty)||0;
  var stop=parseFloat(f.stop)||0;

  // Capital
  if(entry&&qty){
    html+='<div class="card" style="background:var(--signal)10;border-color:var(--signal)30;padding:10px 14px">';
    html+='<div style="font-size:12px;color:var(--sub)">Capital invertido</div>';
    html+='<div style="font-size:16px;font-weight:700;color:var(--signal)">$'+(entry*qty).toFixed(2)+'</div></div>';
  }

  // Stop input + info
  html+='<div><div class="sec-hdr">STOP LOSS $</div>';
  html+='<input class="inp" id="tf-stop" type="number" step="0.01" value="'+(f.stop||'')+'" onblur="tradeFieldUpdate()" placeholder="386.00"/>';
  if(entry&&stop){
    var slPct=((entry-stop)/entry*100).toFixed(2);
    var slEur=qty?(entry-stop)*qty*0.92:0;
    html+='<div style="display:flex;gap:12px;margin-top:6px">';
    html+='<span style="font-size:11px;color:var(--bear)">-'+slPct+'%</span>';
    html+='<span style="font-size:11px;color:var(--sub)">~€'+slEur.toFixed(0)+' de riesgo</span>';
    html+='</div>';
  }

  // Stop suggestions
  if(entry&&f.ticker&&DB.tickers[f.ticker]){
    var stops=calcStops(f.ticker,entry,qty);
    if(stops.length){
      html+='<div style="margin-top:10px"><div class="sec-hdr" style="color:var(--accent)">💡 STOPS SUGERIDOS — pulsa para aplicar</div>';
      stops.forEach(function(s){
        html+='<button onclick="applyStop('+s.stop+')" style="width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;text-align:left;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">';
        html+='<div><div style="font-size:11px;color:var(--accent);font-weight:700">'+s.label+'</div>';
        html+='<div style="font-size:10px;color:var(--sub)">'+s.reason+'</div></div>';
        html+='<div style="text-align:right"><div style="font-size:15px;font-weight:700;color:var(--bear)">$'+s.stop+'</div>';
        html+='<div style="font-size:10px;color:var(--sub)">-'+s.pct+'%</div></div>';
        html+='</button>';
      });
      html+='</div>';
    }
  }
  html+='</div>';

  // Targets
  if(entry&&stop){
    var targets=calcTargets(entry,stop);
    html+='<div class="card" style="border-color:var(--signal)30"><div class="sec-hdr" style="color:var(--signal)">🎯 OBJETIVOS Y GESTIÓN</div>';
    targets.forEach(function(t){
      html+='<div class="metric-row"><div><div style="font-size:12px;font-weight:600">'+t.label+'</div><div style="font-size:10px;color:var(--sub)">→ '+t.action+'</div></div><div style="font-size:15px;font-weight:700;color:var(--signal)">$'+t.price+'</div></div>';
    });
    html+='</div>';
  }

  return html;
}

function renderJournal(){
  var j=DB.journal;
  var byMonth={};j.forEach(function(t){var k=mKey(t.date);if(!byMonth[k])byMonth[k]=[];byMonth[k].push(t);});
  var months=Object.keys(byMonth).sort().reverse();

  var html=hdr('📒 Diario','','',
    '<button class="btn btn-signal" onclick="newTrade()" style="padding:7px 13px;font-size:12px">+ Trade</button>');
  html+='<div class="wrap fade">';

  if(!months.length){html+='<div class="empty"><div style="font-size:40px;margin-bottom:10px">📒</div>Sin operaciones aún.</div>';}
  else{
    months.forEach(function(mk){
      var mT=byMonth[mk],mW=mT.filter(function(t){return t.result==='WIN';}).length;
      var mWR=Math.round(mW/mT.length*100);
      var mPnl=mT.filter(function(t){return t.exit;}).reduce(function(s,t){return s+(pnlPct(t.entry,t.exit)||0);},0).toFixed(1);
      var openTrades=mT.filter(function(t){return t.status==='open'||t.result==='OPEN';}).length;

      html+='<div style="margin-bottom:20px">';
      html+='<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px">';
      html+='<div style="font-size:14px;font-weight:700">'+mLabel(mk)+'</div>';
      html+='<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">';
      html+=mkPill(mT.length+' ops','var(--muted)');
      html+=mkPill(mWR+'% WR',wColor(mWR));
      html+=mkPill((+mPnl>=0?'+':'')+mPnl+'%',pColor(+mPnl));
      if(openTrades)html+=mkPill(openTrades+' abierta'+(openTrades>1?'s':''),'var(--watch)');
      html+='<button class="btn btn-watch" style="padding:4px 10px;font-size:11px" onclick="openReport(\''+mk+'\')">'+(DB.reports[mk]?'📋 Ver':'📋 Informe')+'</button>';
      html+='</div></div>';

      var rev=[].concat(mT).reverse();
      rev.forEach(function(t){
        var p2=t.exit?pnlPct(t.entry,t.exit):null;
        var isOpen2=t.status==='open'||t.result==='OPEN';
        var liveP2=isOpen2&&MKT[t.ticker]?MKT[t.ticker].price:null;
        var livePnl2=liveP2?pnlPct(t.entry,liveP2):null;
        var bc2=isOpen2?'var(--watch)':t.result==='WIN'?'var(--bull)':t.result==='LOSS'?'var(--bear)':'var(--watch)';
        html+='<div class="trade-row" style="border-color:'+bc2+';display:flex;flex-direction:column">';
        html+='<div style="display:flex;align-items:center;gap:8px">';
        html+='<div style="flex:0 0 46px;font-size:11px;color:var(--sub)">'+t.date.slice(5)+'</div>';
        html+='<div style="flex:0 0 50px;font-weight:700;color:var(--accent)">'+t.ticker+'</div>';
        html+='<div style="flex:1;font-size:11px;color:var(--sub)">$'+t.entry+(t.qty?' ×'+t.qty:'')+(t.exit?' → $'+t.exit:'')+'</div>';
        if(isOpen2&&livePnl2!==null)html+='<div style="font-weight:700;color:'+(livePnl2>=0?'var(--bull)':'var(--bear)')+'">'+(livePnl2>=0?'+':'')+livePnl2+'%</div>';
        else if(p2!==null)html+='<div style="font-weight:700;color:'+(p2>=0?'var(--bull)':'var(--bear)')+'">'+(p2>=0?'+':'')+p2+'%</div>';
        html+=mkPill(isOpen2?'LIVE':t.result,bc2);
        html+='<button onclick="delTrade('+t.id+')" style="color:var(--muted);font-size:14px;padding:0 3px">✕</button>';
        html+='</div>';
        if(isOpen2&&liveP2&&livePnl2>3)html+='<div style="font-size:11px;color:var(--signal);margin-top:5px;padding-top:5px;border-top:1px solid var(--border)">💡 Trailing stop: $'+(liveP2*0.97).toFixed(2)+'</div>';
        html+='</div>';
      });
      html+='</div>';
    });
  }
  html+='</div>'+nav();
  return html;
}

// VIEW: COMPARE

function renderCompare(){
  var tickers=Object.keys(DB.tickers),j=DB.journal;
  var html=hdr('⚖️ Comparar','','');
  html+='<div class="wrap fade">';
  if(tickers.length<2){html+='<div class="empty"><div style="font-size:40px;margin-bottom:10px">⚖️</div>Necesitas al menos 2 tickers.</div>';}
  else{
    var analyses=tickers.map(function(sym){return analyzeSymbol(sym);}).filter(function(a){return a!==null;});
    // Phase distribution
    html+='<div class="card" style="margin-bottom:12px"><div class="sec-hdr">DISTRIBUCIÓN POR FASE</div>';
    [PHASES.SIGNAL,PHASES.WATCH,PHASES.RADAR,PHASES.NO].forEach(function(ph){
      var count=analyses.filter(function(a){return a.phase.key===ph.key;}).length;
      if(!count)return;
      var pct=Math.round(count/analyses.length*100);
      html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">';
      html+='<span class="phase-badge '+ph.cls+'" style="width:140px;justify-content:center;font-size:9px">'+ph.label+'</span>';
      html+='<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+ph.color+'"></div></div>';
      html+='<span style="font-size:12px;font-weight:700;color:'+ph.color+';width:30px">'+count+'</span>';
      html+='</div>';
    });
    html+='</div>';

    // Sorted table
    html+='<div class="card"><div class="sec-hdr">RANKING COMPLETO</div>';
    var sorted=[].concat(analyses).sort(function(a,b){return b.oppScore-a.oppScore;});
    sorted.forEach(function(a,i){
      var q=MKT[a.sym];
      html+='<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)" onclick="openTicker(\''+a.sym+'\')" style="cursor:pointer">';
      html+='<div style="font-size:13px;color:var(--muted);width:20px;font-weight:700">'+(i+1)+'</div>';
      html+='<div style="flex:0 0 55px;font-size:15px;font-weight:800;color:var(--accent)">'+a.sym+'</div>';
      html+=phaseBadge(a.phase);
      html+='<div style="flex:1;display:flex;flex-direction:column;gap:3px;margin-left:6px">';
      html+='<div style="display:flex;align-items:center;gap:6px"><span style="font-size:9px;color:var(--sub);width:28px">CTX</span><div class="bar-track"><div class="bar-fill" style="width:'+a.ctx+'%;background:'+(a.ctx>=65?'var(--bull)':a.ctx>=45?'var(--watch)':'var(--bear)')+'"></div></div><span style="font-size:10px;color:var(--text);width:24px">'+a.ctx+'</span></div>';
      html+='<div style="display:flex;align-items:center;gap:6px"><span style="font-size:9px;color:var(--sub);width:28px">ORS</span><div class="bar-track"><div class="bar-fill" style="width:'+a.orsCtx+'%;background:'+(a.orsCtx>=65?'var(--signal)':a.orsCtx>=40?'var(--watch)':'var(--bear)')+'"></div></div><span style="font-size:10px;color:var(--text);width:24px">'+a.orsCtx+'</span></div>';
      html+='</div>';
      if(a.rsi!==null)html+=mkPill('RSI '+a.rsi,a.rsiColor);
      html+='</div>';
    });
    html+='</div>';

    // AI Compare
    html+='<div class="card ai-box"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
    html+='<div style="font-size:10px;color:var(--accent);letter-spacing:2px;font-weight:700">⚡ ANÁLISIS COMPARATIVO IA</div>';
    html+='<button class="btn btn-watch" onclick="runCompareAI()" style="padding:6px 12px;font-size:11px">'+(AI_LOADING?'Comparando...':'Comparar con IA')+'</button>';
    html+='</div>';
    if(AI_LOADING)html+='<div style="color:var(--muted);font-size:12px">Comparando...</div>';
    else if(AI_TEXT)html+='<div style="font-size:13px;color:var(--text);line-height:1.9;white-space:pre-wrap">'+AI_TEXT.replace(/</g,'&lt;')+'</div>';
    else html+='<div style="color:var(--muted);font-size:12px">Pulsa para comparar todos los tickers con IA.</div>';
    html+='</div>';
  }
  html+='</div>'+nav();
  return html;
}

// ── MANUAL ORDER PANEL ────────────────────────────────
function showManualOrderPanel() {
  var sym=prompt('Ticker (ej: AMD):');if(!sym)return;
  sym=sym.toUpperCase();
  var qty=prompt('Nº de acciones:');if(!qty)return;
  var stop=prompt('Stop loss $:');if(!stop)return;
  var entry=MKT[sym]?MKT[sym].price:null;
  if(!entry){toast('Primero añade '+sym+' al watchlist');return;}
  var risk=((entry-parseFloat(stop))*parseFloat(qty)*0.92).toFixed(0);
  if(!confirm('Confirmar orden:\nComprar '+qty+' '+sym+' a $'+entry.toFixed(2)+'\nStop: $'+stop+'\nRiesgo: ~€'+risk)){return;}
  fetch(PROXY+'/ibkr/order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sym:sym,qty:+qty,price:entry,stopPrice:+stop})})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.error)toast('❌ Error: '+d.error,4000);
      else{toast('✅ Orden enviada a IBKR');sendTG('📤 Orden manual ejecutada: '+qty+' '+sym+' · Stop $'+stop);}
    })
    .catch(function(e){toast('Error de conexión: '+e.message,4000);});
}

function renderReport(){
  var mk=MONTH;
  var trades=DB.journal.filter(function(t){return mKey(t.date)===mk;});
  var wins=trades.filter(function(t){return t.result==='WIN';}),losses=trades.filter(function(t){return t.result==='LOSS';});
  var pnls=trades.filter(function(t){return t.exit;}).map(function(t){return pnlPct(t.entry,t.exit);});
  var tPnl=pnls.reduce(function(a,b){return a+b;},0).toFixed(2);
  var aPnl=pnls.length?(pnls.reduce(function(a,b){return a+b;},0)/pnls.length).toFixed(2):0;
  var wr=trades.length?Math.round(wins.length/trades.length*100):0;
  var best=trades.filter(function(t){return t.exit;}).sort(function(a,b){return pnlPct(b.entry,b.exit)-pnlPct(a.entry,a.exit);})[0];
  var worst=trades.filter(function(t){return t.exit;}).sort(function(a,b){return pnlPct(a.entry,a.exit)-pnlPct(b.entry,b.exit);})[0];
  var noObv=losses.filter(function(t){return !t.conditions.obvAlcista;}).length;

      html+='</div>';

  else html+='<div style="color:var(--muted);font-size:12px">Pulsa "⚡ IA" para el análisis completo.</div>';
  html+='</div></div>';
  return html;
}

function render(){
  var root=document.getElementById('root');if(!root)return;
  var html='';
  try{
    if(VIEW==='home')         html=renderHome();
    else if(VIEW==='addTicker') html=renderAddTicker();
    else if(VIEW==='journal') html=renderJournal();
    else if(VIEW==='addTrade')html=renderAddTrade();
    else if(VIEW==='ticker')  html=renderTicker();
    else if(VIEW==='compare') html=renderCompare();
    else if(VIEW==='settings')html=renderSettings();
    else if(VIEW==='report')  html=renderReport();
    else if(VIEW==='positions')html=renderPositions();
    else if(VIEW==='backtest') html=renderBacktest();
    else html=renderHome();
  }catch(e){html='<div style="padding:20px;color:var(--bear);font-size:12px">Error: '+e.message+'<br><button onclick="VIEW=\'home\';render()" style="color:var(--accent);margin-top:10px">← Inicio</button></div>';}
  root.innerHTML=html;
  // Draw charts
  if(VIEW==='home')Object.keys(DB.tickers).forEach(function(sym){var tk=DB.tickers[sym];if(tk.prices&&tk.prices.length>1){var a=analyzeSymbol(sym);var col=a?a.phase.color.replace('var(','').replace(')',''):'#f0c040';drawMini('mini-'+sym,tk.prices,col);}});
  if(VIEW==='ticker'&&TAB==='chart'){var tk=DB.tickers[TICKER];if(tk&&tk.prices&&tk.prices.length>1){var a2=analyzeSymbol(TICKER);var shortL=a2&&a2.allLvl?a2.allLvl.short:{supports:[],resistances:[]};var tkT=DB.journal.filter(function(t){return t.ticker===TICKER;});drawChart('main-chart',tk.prices,shortL,tkT,220);}}
  // Draw equity curve for backtest
  if(VIEW==='backtest'&&TICKER){
    var bt2=runBacktest(TICKER);
    if(bt2&&bt2.allResults.length){
      setTimeout(function(){
        var canvas=document.getElementById('bt-chart');if(!canvas)return;
        var dpr=window.devicePixelRatio||1,w=canvas.offsetWidth||300,h=120;
        canvas.width=w*dpr;canvas.height=h*dpr;canvas.style.height=h+'px';
        var ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
        var equity=[0],cumPnl=0;
        bt2.allResults.forEach(function(r){cumPnl+=r.pnl;equity.push(cumPnl);});
        var mn=Math.min.apply(null,equity),mx=Math.max.apply(null,equity),rng=mx-mn||1;
        var pd={t:10,r:10,b:10,l:10},cw=w-pd.l-pd.r,ch=h-pd.t-pd.b;
        function xOf(i){return pd.l+(i/(equity.length-1))*cw;}
        function yOf(v){return pd.t+(1-(v-mn)/rng)*ch;}
        // Zero line
        ctx.setLineDash([2,4]);ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(pd.l,yOf(0));ctx.lineTo(w-pd.r,yOf(0));ctx.stroke();
        // Area
        ctx.setLineDash([]);
        var grad=ctx.createLinearGradient(0,0,0,h);
        grad.addColorStop(0,cumPnl>=0?'rgba(0,229,160,0.3)':'rgba(255,69,96,0.3)');
        grad.addColorStop(1,'rgba(0,0,0,0)');
        ctx.beginPath();ctx.moveTo(xOf(0),yOf(equity[0]));
        for(var i=1;i<equity.length;i++)ctx.lineTo(xOf(i),yOf(equity[i]));
        ctx.lineTo(xOf(equity.length-1),ch+pd.t);ctx.lineTo(xOf(0),ch+pd.t);
        ctx.closePath();ctx.fillStyle=grad;ctx.fill();
        // Line
        ctx.beginPath();ctx.moveTo(xOf(0),yOf(equity[0]));
        for(var j=1;j<equity.length;j++)ctx.lineTo(xOf(j),yOf(equity[j]));
        ctx.strokeStyle=cumPnl>=0?'#00e5a0':'#ff4560';ctx.lineWidth=2;ctx.stroke();
      },80);
    }
  }
}

};
window.loadIntraday=function(sym){
  if(INTRADAY[sym]&&Date.now()-INTRADAY[sym].ts<4*60*1000){ render(); return; }
  fetchIntraday(sym,function(prices15){
    if(prices15){ INTRADAY[sym]={prices15:prices15,ts:Date.now()}; }
    render();
    // Draw 15min chart after render
    setTimeout(function(){
      if(!prices15||!prices15.length)return;
      var canvas=document.getElementById('chart-15m');
      if(!canvas)return;
      var dpr=window.devicePixelRatio||1,w=canvas.offsetWidth||300,h=160;
      canvas.width=w*dpr;canvas.height=h*dpr;canvas.style.height=h+'px';
      var ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
      var cls=prices15.map(function(p){return p.close;});
      var mn=Math.min.apply(null,cls)*0.997,mx=Math.max.apply(null,cls)*1.003,rng=mx-mn||1;
      var pd={t:8,r:52,b:8,l:4},cw=w-pd.l-pd.r,ch=h-pd.t-pd.b;
      function xOf(i){return pd.l+(i/(cls.length-1))*cw;}
      function yOf(v){return pd.t+(1-(v-mn)/rng)*ch;}
      // Grid lines
      ctx.strokeStyle='rgba(30,45,69,0.4)';ctx.lineWidth=1;ctx.setLineDash([]);
      [0,0.5,1].forEach(function(p){
        var y=pd.t+p*ch;ctx.beginPath();ctx.moveTo(pd.l,y);ctx.lineTo(w-pd.r,y);ctx.stroke();
        ctx.fillStyle='#3a4f6a';ctx.font='9px monospace';
        ctx.fillText('$'+(mn+(1-p)*rng).toFixed(0),w-pd.r+2,y+3);
      });
      // Color area green/red based on direction
      var startP=cls[0],endP=cls[cls.length-1];
      var areaCol=endP>=startP?'rgba(0,229,160,':'rgba(255,69,96,';
      var grad=ctx.createLinearGradient(0,0,0,h);
      grad.addColorStop(0,areaCol+'0.2)');grad.addColorStop(1,areaCol+'0)');
      ctx.beginPath();ctx.moveTo(xOf(0),yOf(cls[0]));
      for(var i=1;i<cls.length;i++)ctx.lineTo(xOf(i),yOf(cls[i]));
      ctx.lineTo(xOf(cls.length-1),ch+pd.t);ctx.lineTo(xOf(0),ch+pd.t);
      ctx.closePath();ctx.fillStyle=grad;ctx.fill();
      // Price line
      ctx.beginPath();ctx.moveTo(xOf(0),yOf(cls[0]));
      for(var j=1;j<cls.length;j++)ctx.lineTo(xOf(j),yOf(cls[j]));
      ctx.strokeStyle=endP>=startP?'#00e5a0':'#ff4560';ctx.lineWidth=1.5;ctx.stroke();
    },100);
  });
};
window.checkIBKRStatus=function(){
  var badge=document.getElementById('ibkr-status-badge');
  if(badge)badge.innerHTML='<span class="pill" style="background:var(--muted)20;border:1px solid var(--muted)40;color:var(--muted)">⏳ Verificando...</span>';
  fetch(PROXY+'/ibkr/status')
    .then(function(r){return r.json();})
    .then(function(d){
      var badge2=document.getElementById('ibkr-status-badge');
      if(!badge2)return;
      if(d.authenticated){
        badge2.innerHTML='<span class="pill" style="background:var(--signal)20;border:1px solid var(--signal)40;color:var(--signal)">● Conectado</span>';
        toast('✅ IBKR conectado — '+(d.paper?'Paper Trading':'Cuenta Real'));
      } else {
        badge2.innerHTML='<span class="pill" style="background:var(--bear)20;border:1px solid var(--bear)40;color:var(--bear)">● Desconectado</span>';
        toast('⚠️ IBKR no conectado — activa la API en portal.interactivebrokers.com',5000);
      }
    })
    .catch(function(){
      var badge3=document.getElementById('ibkr-status-badge');
      if(badge3)badge3.innerHTML='<span class="pill" style="background:var(--bear)20;border:1px solid var(--bear)40;color:var(--bear)">● Error</span>';
      toast('Error al conectar con el proxy',3000);
    });
};

window.checkIBKRPositions=function(){
  var panel=document.getElementById('ibkr-positions-panel');
  if(panel)panel.innerHTML='<div style="font-size:11px;color:var(--sub);padding:8px 0">Cargando posiciones...</div>';
  fetch(PROXY+'/ibkr/positions')
    .then(function(r){return r.json();})
    .then(function(d){
      var panel2=document.getElementById('ibkr-positions-panel');
      if(!panel2)return;
      if(d.error||!d||!d.length){
        panel2.innerHTML='<div style="font-size:11px;color:var(--muted);padding:8px 0">'+(d.error?'❌ '+d.error:'Sin posiciones abiertas en IBKR.')+'</div>';
        return;
      }
      var html='<div class="sec-hdr" style="margin-top:10px">POSICIONES IBKR</div>';
      d.forEach(function(p){
        var pnl=p.unrealizedPnl||0;
        var col=pnl>=0?'var(--bull)':'var(--bear)';
        html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">';
        html+='<div><div style="font-size:13px;font-weight:700;color:var(--accent)">'+(p.contractDesc||p.ticker||'—')+'</div>';
        html+='<div style="font-size:10px;color:var(--sub)">'+p.position+' acc · $'+(p.mktPrice||0).toFixed(2)+'</div></div>';
        html+='<div style="text-align:right"><div style="font-size:13px;font-weight:700;color:'+col+'">'+(pnl>=0?'+':'')+pnl.toFixed(2)+'$</div></div>';
        html+='</div>';
      });
      panel2.innerHTML=html;
    })
    .catch(function(){
      var panel3=document.getElementById('ibkr-positions-panel');
      if(panel3)panel3.innerHTML='<div style="font-size:11px;color:var(--bear);padding:8px 0">❌ Error al cargar posiciones</div>';
    });
};
