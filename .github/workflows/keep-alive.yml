name: Keep Proxy Alive During Market Hours

on:
  schedule:
    # Lunes a Viernes, 14:00-21:30 UTC
    # = 15:30-22:30 hora española verano (UTC+1 invierno = 15:00-22:00)
    - cron: '0,10,20,30,40,50 14-20 * * 1-5'
    - cron: '0,10,20,30 21 * * 1-5'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping ORS Proxy
        run: |
          echo "Pinging proxy at $(date) UTC"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ors-proxy-jet6.onrender.com/health)
          echo "Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Proxy activo"
          else
            echo "⚠️ Proxy no responde (status $STATUS)"
          fi
